<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <!-- REUSABLE FRAGMENT 1: The CSS -->
    <th:block th:fragment="header-css">
        <!-- Google Fonts: Oswald -->
        <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <!-- Our Custom Valorant Styles -->
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </th:block>
</head>
<body>

<!-- REUSABLE FRAGMENT 2: The Navigation Bar -->
<!-- REUSABLE FRAGMENT 2: The Navigation Bar -->
<nav th:fragment="navbar" class="navbar navbar-dark mb-4" style="background-color: #111111; border-bottom: 3px solid #ff4655;">
    <div class="container">
        <a class="navbar-brand text-light fs-3" href="/">
            <span style="color: #ff4655;">V</span>ALORANT ISSUE TRACKER
        </a>

        <div class="d-flex">

            <!-- VISIBLE TO GUESTS ONLY -->
            <div sec:authorize="isAnonymous()">
                <a class="btn btn-outline-light me-2" href="/login" style="border-radius: 0;">Sign In</a>
                <a class="btn btn-valorant" href="/register">Create Account</a>
            </div>

            <!-- VISIBLE TO LOGGED IN USERS ONLY (Users & Admins) -->
            <div sec:authorize="isAuthenticated()" class="d-flex">
                <a class="btn btn-valorant me-3" href="/new">Report Bug</a>

                <form th:action="@{/logout}" method="post" class="m-0">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-outline-light" style="border-radius: 0;">Logout</button>
                </form>
            </div>

        </div>
    </div>
</nav>

</body>
</html>
